# Редирект старого домена на woner.ru (сохраняет путь: /m/... → https://woner.ru/m/...)

server {
    listen 443 ssl;
    server_name masterclient45.ru www.masterclient45.ru;

    ssl_certificate /etc/letsencrypt/live/masterclient45.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masterclient45.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://woner.ru$request_uri;
}

server {
    listen 80;
    server_name masterclient45.ru www.masterclient45.ru;
    return 301 https://woner.ru$request_uri;
}
