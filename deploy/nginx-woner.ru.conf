# /etc/nginx/sites-available/woner.ru
# Прокси на CRM (порт 3000), SSL — certbot.

server {
    server_name woner.ru www.woner.ru;

    client_max_body_size 12M;

    location /webhook {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Не кешировать ответы прокси на уровне nginx — политика задаётся backend (Express).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    ssl_certificate /etc/letsencrypt/live/woner.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/woner.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.woner.ru) {
        return 301 https://$host$request_uri;
    }

    if ($host = woner.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name woner.ru www.woner.ru;
    return 404;
}
