version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crm_max_db
    environment:
      POSTGRES_DB: crm_max
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_max_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crm_max
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_max_frontend
    environment:
      VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: crm_max_bot
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_API_URL: ${MAX_API_URL:-https://api.max.ru}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  notification_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: crm_max_notifications
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crm_max
      DB_USER: postgres
      DB_PASSWORD: postgres123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: